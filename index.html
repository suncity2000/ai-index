<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Command Center - Glassmorphism</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root { 
            --bg-dark: #070b14;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-blue: #3086ff;
            --accent-cyan: #00f2ff;
            --text-main: #f1f5f9;
        }

        body { 
            font-family: 'Pretendard', sans-serif; background: var(--bg-dark); 
            margin: 0; padding: 30px; color: var(--text-main);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(48, 134, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 1800px; margin: 0 auto; }

        /* 글리치 애니메이션 복구 */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .glitch { 
            font-size: 2.2rem; font-weight: 900; color: var(--accent-cyan); 
            text-transform: uppercase; position: relative;
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75), 0.025em 0.05em 0 rgba(0,0,255,.75);
            animation: glitch 1.5s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,0,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,0,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,0,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,0,.75); }
        }

        /* 인사이트 박스 - 글래스모피즘 */
        .insight-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .insight-item { 
            background: var(--glass-bg); backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border); padding: 20px; border-radius: 15px;
            font-size: 1rem; border-left: 4px solid var(--accent-blue);
        }

        /* 카드 - 글래스모피즘 */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .card { 
            background: var(--glass-bg); backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); border-radius: 20px; 
            padding: 25px; height: 450px; display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .card h2 { font-size: 1.2rem; color: var(--accent-blue); display: flex; justify-content: space-between; align-items: center; margin-top: 0; }

        /* 툴팁 기능 복구 */
        .info-icon { 
            cursor: pointer; background: rgba(255,255,255,0.1); width: 24px; height: 24px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; position: relative;
        }
        .info-icon:hover::after {
            content: attr(data-tooltip); position: absolute; bottom: 130%; right: 0; 
            width: 250px; background: rgba(15, 23, 42, 0.95); color: #fff; padding: 12px;
            border-radius: 10px; font-size: 0.85rem; z-index: 999; backdrop-filter: blur(5px);
            border: 1px solid var(--accent-blue); box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }

        .chart-container { flex-grow: 1; position: relative; width: 100%; min-height: 0; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="glitch">AI Command Center</div>
            <div style="text-align: right;">
                <div id="update-time" style="font-size: 1rem; color: var(--accent-cyan); font-weight: 700;">SYNC: --</div>
            </div>
        </header>

        <div class="insight-grid">
            <div class="insight-item"><span style="color:var(--accent-cyan); font-weight:800; display:block; margin-bottom:5px;">STRATEGY</span>추론 중심의 o1 시리즈가 지능 지표를 선도하며 차세대 AI의 기준을 정립하고 있습니다.</div>
            <div class="insight-item"><span style="color:var(--accent-cyan); font-weight:800; display:block; margin-bottom:5px;">GROWTH</span>영상 생성 분야의 일관성 지수는 매달 기록적인 상승폭을 보이며 상용화 단계에 진입했습니다.</div>
            <div class="insight-item"><span style="color:var(--accent-cyan); font-weight:800; display:block; margin-bottom:5px;">KOREA</span>한국은 특화 데이터셋 중심의 에이전트 개발에서 글로벌 Top 5 경쟁력을 증명하고 있습니다.</div>
        </div>

        <div class="grid">
            <div class="card">
                <h2>🧠 Intelligence <div class="info-icon" data-tooltip="Elo Score: 모델 간 대결 승률을 기반으로 한 지능 지수입니다. 1350점 이상은 현시점 최고 수준입니다.">?</div></h2>
                <div class="chart-container"><canvas id="intelChart"></canvas></div>
            </div>
            <div class="card">
                <h2>🎨 Image Gen <div class="info-icon" data-tooltip="Human Preference: 사용자들이 실제 생성 결과물을 보고 투표한 선호도 순위입니다.">?</div></h2>
                <div class="chart-container"><canvas id="imageChart"></canvas></div>
            </div>
            <div class="card">
                <h2>🎬 Video Gen <div class="info-icon" data-tooltip="VBench: 영상의 움직임, 물리 법칙, 화질을 종합 평가한 백분율 지수입니다.">?</div></h2>
                <div class="chart-container"><canvas id="videoChart"></canvas></div>
            </div>
            <div class="card">
                <h2>🤖 Agent Task <div class="info-icon" data-tooltip="Success Rate: 복잡한 단계를 거쳐 스스로 웹이나 도구를 활용해 목표를 달성한 확률입니다.">?</div></h2>
                <div class="chart-container"><canvas id="agentChart"></canvas></div>
            </div>
            <div class="card">
                <h2>👥 Popularity <div class="info-icon" data-tooltip="Relative Reach: 검색량과 방문자 수를 기반으로 ChatGPT를 100으로 설정한 상대적 인기입니다.">?</div></h2>
                <div class="chart-container"><canvas id="userChart"></canvas></div>
            </div>
            <div class="card">
                <h2>🌍 Global Index <div class="info-icon" data-tooltip="Global Strength: 인프라, 인재, 특허 등 7대 핵심 역량을 합산한 국가별 종합 지수입니다.">?</div></h2>
                <div class="chart-container"><canvas id="countryChart"></canvas></div>
            </div>
        </div>
    </div>

    <script>
        Chart.defaults.font.size = 14;
        Chart.defaults.color = '#94a3b8';

        const commonOpt = { 
            responsive: true, maintainAspectRatio: false,
            animation: { duration: 2000, easing: 'easeOutQuart' },
            plugins: { 
                legend: { labels: { color: '#f1f5f9', font: { weight: '600' } } },
                tooltip: { backgroundColor: 'rgba(7, 11, 20, 0.9)', padding: 12, cornerRadius: 10 }
            },
            scales: { 
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                x: { grid: { display: false }, ticks: { color: '#64748b' }, offset: true }
            }
        };

        async function loadData() {
            const res = await fetch('data.json?t=' + new Date().getTime());
            const data = await res.json();
            const latest = data[data.length - 1];
            document.getElementById('update-time').innerText = 'SYNC: ' + latest.date;

            // Intelligence (Line)
            new Chart(document.getElementById('intelChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: ['o1-2024-12-17', 'GPT-4o', 'Claude 3.5 Sonnet'].map((name, i) => ({
                        label: name,
                        data: data.map(d => d.intelligence.find(m => m.name === name)?.score),
                        borderColor: ['#00f2ff', '#3086ff', '#a855f7'][i],
                        backgroundColor: 'transparent', tension: 0.4, borderWidth: 4, pointRadius: 5
                    }))
                }, options: commonOpt
            });

            renderBar('imageChart', latest.image_gen, '#00f2ff');
            renderBar('videoChart', latest.video_gen, '#3086ff');
            renderBar('agentChart', latest.agents, '#a855f7');
            renderBar('userChart', latest.user_popularity, '#3dd68c');
            renderBar('countryChart', latest.country_rank, '#94a3b8', 'country');
        }

        function renderBar(id, items, color, key = 'name') {
            new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: items.map(i => i[key]),
                    datasets: [{ label: '', data: items.map(i => i.score), backgroundColor: color + 'aa', borderRadius: 10, barThickness: 30 }]
                }, 
                options: { ...commonOpt, plugins: { ...commonOpt.plugins, legend: { display: false } } }
            });
        }
        loadData();
    </script>
</body>
</html>
