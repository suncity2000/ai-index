<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Global Index Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f1f5f9; --card: #ffffff; --primary: #3b82f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { margin-bottom: 30px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); height: 450px; display: flex; flex-direction: column; }
        .chart-container { flex-grow: 1; position: relative; width: 100%; min-height: 0; }
        h2 { font-size: 1.1rem; margin-bottom: 15px; color: #475569; border-left: 4px solid var(--primary); padding-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Global AI Tracker</h1>
            <p>분야별 최신 AI 모델 성능 및 국가별 발전 지표</p>
        </div>
        <div class="grid">
            <div class="card"><h2>모델별 지능 지수(Elo) 추이</h2><div class="chart-container"><canvas id="intelChart"></canvas></div></div>
            <div class="card"><h2>이미지 생성 선호도 순위</h2><div class="chart-container"><canvas id="imageChart"></canvas></div></div>
            <div class="card"><h2>영상 생성 성능 지수</h2><div class="chart-container"><canvas id="videoChart"></canvas></div></div>
            <div class="card"><h2>AI 에이전트 수행 능력</h2><div class="chart-container"><canvas id="agentChart"></canvas></div></div>
            <div class="card"><h2>국가별 AI 발전 지수</h2><div class="chart-container"><canvas id="countryChart"></canvas></div></div>
        </div>
    </div>

    <script>
        const commonOpt = { responsive: true, maintainAspectRatio: false, resizeDelay: 200 };

        async function loadData() {
            const res = await fetch('data.json?t=' + new Date().getTime());
            const data = await res.json();
            const latest = data[data.length - 1];

            // 1. 지능 추이 (Line)
            new Chart(document.getElementById('intelChart'), {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: ['o1-2024-12-17', 'GPT-4o', 'Claude 3.5 Sonnet'].map((name, i) => ({
                        label: name,
                        data: data.map(d => d.intelligence.find(m => m.name === name)?.score),
                        borderColor: ['#000', '#3b82f6', '#f97316'][i], tension: 0.3
                    }))
                }, options: commonOpt
            });

            // 2. 막대 차트들 (Bar)
            renderBar('imageChart', latest.image_gen, '#f87171');
            renderBar('videoChart', latest.video_gen, '#818cf8');
            renderBar('agentChart', latest.agents, '#34d399');
            renderBar('countryChart', latest.country_rank, '#94a3b8', 'country');
        }

        function renderBar(id, items, color, key = 'name') {
            new Chart(document.getElementById(id), {
                type: 'bar',
                data: {
                    labels: items.map(i => i[key]),
                    datasets: [{ data: items.map(i => i.score), backgroundColor: color }]
                }, options: { ...commonOpt, plugins: { legend: { display: false } } }
            });
        }
        loadData();
    </script>
</body>
</html>
