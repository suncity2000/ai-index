<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Global Index Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #3b82f6; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 40px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { margin-bottom: 40px; text-align: center; }
        
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); 
            gap: 24px; 
        }
        
        .card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            /* 카드가 늘어나지 못하도록 명시적 높이 부여 */
            height: 500px; 
            display: flex;
            flex-direction: column;
        }

        /* 차트 영역이 남은 공간을 다 차지하도록 설정 */
        .chart-container {
            flex-grow: 1;
            position: relative;
            width: 100%;
            min-height: 0; /* 중요: flex 아이템이 무한정 늘어나는 것 방지 */
        }

        h2 { font-size: 1.25rem; margin-bottom: 20px; color: #475569; border-left: 4px solid var(--primary); padding-left: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Global AI Tracker</h1>
            <p>공개 벤치마크 기반 실시간 AI 지표 및 6개월 단위 추이 분석</p>
        </div>

        <div class="grid">
            <div class="card">
                <h2>모델별 지능 지수(Elo) 시계열 추이</h2>
                <div class="chart-container">
                    <canvas id="intelligenceChart"></canvas>
                </div>
            </div>
            <div class="card">
                <h2>국가별 AI 발전 지수 비교</h2>
                <div class="chart-container">
                    <canvas id="countryChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 공통 차트 옵션 설정
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            // 리사이즈 루프 방지를 위한 추가 설정
            resizeDelay: 200 
        };

        async function loadData() {
            try {
                const response = await fetch('data.json?t=' + new Date().getTime());
                const data = await response.json();
                
                const labels = data.map(entry => entry.date);
                const modelNames = ['o1-2024-12-17', 'GPT-4o', 'Claude 3.5 Sonnet', 'Gemini 1.5 Pro'];
                const colors = ['#000000', '#3b82f6', '#f97316', '#10b981'];

                const datasets = modelNames.map((name, i) => ({
                    label: name,
                    data: data.map(entry => {
                        const model = entry.intelligence.find(m => m.name === name);
                        return model ? model.score : null;
                    }),
                    borderColor: colors[i],
                    backgroundColor: colors[i] + '22',
                    tension: 0.3,
                    fill: false
                }));

                // 1. 지능 지수 차트
                new Chart(document.getElementById('intelligenceChart'), {
                    type: 'line',
                    data: { labels: labels, datasets: datasets },
                    options: { 
                        ...commonOptions,
                        scales: { y: { beginAtZero: false } }
                    }
                });

                // 2. 국가별 차트
                const latest = data[data.length - 1];
                new Chart(document.getElementById('countryChart'), {
                    type: 'bar',
                    data: {
                        labels: latest.country_rank.map(c => c.country),
                        datasets: [{
                            label: '발전 점수',
                            data: latest.country_rank.map(c => c.score),
                            backgroundColor: ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6']
                        }]
                    },
                    options: commonOptions
                });
            } catch (e) {
                console.error("데이터 로드 에러:", e);
            }
        }
        loadData();
    </script>
</body>
</html>
