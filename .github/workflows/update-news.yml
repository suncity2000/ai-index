name: Update AI News

on:
  schedule:
    # 매일 한국시간 오후 6시 (KST 18:00 = UTC 09:00)
    # 하루 동안의 뉴스를 수집하기 위해 저녁에 실행
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        cd scripts
        npm install

    - name: Fetch AI news
      run: |
        cd scripts
        node fetch-news.js

    - name: Commit and push if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/ai-news.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Update AI news - $(date +'%Y-%m-%d')" && git push origin master)
